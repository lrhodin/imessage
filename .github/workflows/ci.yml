name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────
  # Lint – quick static analysis
  # ───────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: go vet (imessage)
        run: go vet ./imessage/...

      - name: go vet (bbctl)
        run: go vet ./cmd/bbctl/...

  # ───────────────────────────────────────────────────────────────
  # Unit tests – pure-Go packages (no Rust/CGO bridge needed)
  # ───────────────────────────────────────────────────────────────
  test-imessage:
    name: Test imessage/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Run tests with coverage
        run: go test -v -count=1 -coverprofile=coverage-imessage.out ./imessage/...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-imessage
          path: coverage-imessage.out
          retention-days: 7

  # NOTE: pkg/connector/ tests require the Rust static library (librustpushgo.a)
  # and are run as part of the build jobs below (after `make build`).

  # ───────────────────────────────────────────────────────────────
  # Full build – Rust + Go on macOS and Linux
  # ───────────────────────────────────────────────────────────────
  build-macos:
    name: Build (macOS)
    runs-on: macos-14          # Apple Silicon (ARM64)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          brew install libolm protobuf

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pkg/rustpushgo/target
          key: cargo-macos-arm64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-macos-arm64-

      - name: Build
        run: make build

      - name: Test pkg/connector/
        env:
          CGO_CFLAGS: -I/opt/homebrew/include
          CGO_LDFLAGS: -L/opt/homebrew/lib
        run: go test -v -count=1 -coverprofile=coverage-connector-macos.out ./pkg/connector/...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-connector-macos
          path: coverage-connector-macos.out
          retention-days: 7

      - name: Upload macOS app bundle
        uses: actions/upload-artifact@v4
        with:
          name: mautrix-imessage-v2-macos-arm64
          path: |
            mautrix-imessage-v2.app/
            bbctl
          retention-days: 14

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake pkg-config git curl \
            libolm-dev libclang-dev libssl-dev libunicorn-dev \
            protobuf-compiler sqlite3

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pkg/rustpushgo/target
          key: cargo-linux-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-linux-

      - name: Build
        run: make build

      - name: Test pkg/connector/
        run: go test -v -count=1 -coverprofile=coverage-connector-linux.out ./pkg/connector/...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-connector-linux
          path: coverage-connector-linux.out
          retention-days: 7

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: mautrix-imessage-v2-linux
          path: |
            mautrix-imessage-v2
            bbctl
          retention-days: 14
